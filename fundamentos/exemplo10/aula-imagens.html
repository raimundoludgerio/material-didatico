<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens dinâmicas</title>
</head>
<body>
    <picture>
        <source media="(max-width: 700px)" srcset="imagens/lua-300px.png">
        <source media="(max-width: 1000px)" srcset="imagens/lua-700px.png">
        <source media="(min-width: 1000px)" srcset="imagens/lua-1000px.png">
        <img src="imagens/original.jpg" alt="imagem da lua">
    </picture>


</body>
</html>
