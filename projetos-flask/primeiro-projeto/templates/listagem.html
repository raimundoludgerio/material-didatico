<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul>
        {% if users %}
            {% for u in users %}
                <li>{{ u.nome }} - {{ u.hora }}</li>
            {% endfor %}
        {% else %}
            <p>Nenhum usuário cadastrado</p>
        {% endif %}
    </ul>
</body>
</html>
